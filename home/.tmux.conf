# ~/.tmux.conf — mouse-first, copy-paste-just-works
#
# Tuned for someone who drives tmux primarily with the mouse and expects
# selecting text to land in the OS clipboard, even over SSH / Coder /
# Codespaces. Keybindings are kept minimal; the prefix is left at the
# tmux default (C-b) so it doesn't collide with readline's beginning-of-line.

# ---- core ---------------------------------------------------------------
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*-256color:Tc"
set -sg escape-time 10              # cut input lag for vim/nvim
set -g  history-limit 50000         # generous scrollback for mouse wheel
set -g  base-index 1                # windows numbered from 1 (left-to-right on a 1-9 row)
setw -g pane-base-index 1
set -g  renumber-windows on         # close window 2 of 3 -> renumber to 1,2
set -g  focus-events on
setw -g mode-keys vi                # only matters inside copy-mode

# ---- mouse: the whole point --------------------------------------------
# - click a pane to focus
# - drag a pane border to resize
# - drag a window in the status bar to reorder
# - scroll wheel auto-enters copy-mode and scrolls history
set -g mouse on

# ---- clipboard: OSC 52 to the host terminal ----------------------------
# `on` means tmux writes selections to the OUTER terminal's clipboard via
# the OSC 52 escape sequence. That's how a copy inside a tmux running on a
# Coder workspace / Codespace / SSH host ends up in your laptop's clipboard
# without xclip/wl-copy/pbcopy. Supported by: iTerm2, kitty, Alacritty,
# WezTerm, Ghostty, Windows Terminal, code-server, VS Code's terminal,
# Ghostty, and most modern terminals.
#
# If your terminal needs OSC 52 explicitly enabled:
#   - iTerm2:   Preferences -> General -> Selection -> "Applications in
#               terminal may access clipboard"
#   - VS Code:  setting "terminal.integrated.enableClipboardSupport" (on by default)
#   - kitty:    `clipboard_control write-clipboard write-primary` in kitty.conf
set -g set-clipboard on

# Drag-select with the mouse -> copy + leave copy-mode (iTerm-like).
# tmux's default is to stay in copy-mode after release, which surprises
# anyone who isn't constantly hitting `q`.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel

# Plain click while in copy-mode -> drop selection and exit. Lets you
# "click off" of a selection the same way you would in any GUI app.
bind -T copy-mode-vi MouseDown1Pane select-pane \; send -X clear-selection \; send -X cancel
bind -T copy-mode    MouseDown1Pane select-pane \; send -X clear-selection \; send -X cancel

# Right-click anywhere -> paste the most recent buffer. No prefix needed.
bind -n MouseDown3Pane paste-buffer

# ---- a few keyboard niceties (still optional) --------------------------
# Reload this file in place: prefix r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
# Splits that remember the current pane's working directory, with mnemonic keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"

# ---- status bar: quiet, readable ---------------------------------------
set -g status-interval 5
set -g status-position bottom
set -g status-style              "fg=white,bg=default"
set -g status-left               " #[bold]#S #[default]"
set -g status-left-length        30
set -g status-right              "%Y-%m-%d %H:%M "
set -g window-status-format       " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=black,bg=cyan,bold"
set -g pane-border-style         "fg=brightblack"
set -g pane-active-border-style  "fg=cyan"
set -g message-style             "fg=black,bg=cyan"
