[tools]
node = "24"
pnpm = "10"
python = "3.14"
go = "1.26"
ruby = "3.4"
gh = "latest"
starship = "latest"
claude = "latest"

[settings]
# Download precompiled Ruby from jdx/ruby instead of compiling from
# source via ruby-build. Avoids needing libssl-dev / libyaml-dev / etc.
# on every workspace and shaves ~10 minutes off cold installs.
ruby.compile = false

